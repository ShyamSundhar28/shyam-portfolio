<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Shorts Video Selection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #8b5cf6;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color), #000000);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2.5rem 0;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: 2.8rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1s ease-out;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 0.5rem;
            animation: fadeIn 1.5s ease-out;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .controls {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            animation: slideUp 0.8s ease-out;
        }

        select, button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        select {
            min-width: 200px;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        button {
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            font-weight: 600;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        button:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            animation: fadeIn 1s ease-out;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border-color: var(--primary);
        }

        .video-thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .video-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .video-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .video-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            margin-top: auto;
        }

        .generate-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .generate-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .loader {
            display: none;
            text-align: center;
            font-size: 1.2rem;
            margin-top: 2rem;
            color: var(--primary);
            animation: pulse 1.5s infinite;
        }

        /* Generation Status Overlay */
        .status-container {
            display: none;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-top: 1rem;
            animation: slideUp 0.5s ease-out;
        }

        .status-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .current-status {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        .log-terminal {
            background: #000;
            border-radius: 8px;
            padding: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #10b981;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
            margin-bottom: 1rem;
        }

        .script-output {
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--primary);
            border-radius: 8px;
            padding: 1.5rem;
            color: #fff;
            font-size: 1rem;
            line-height: 1.6;
            display: none;
            animation: fadeIn 1s;
        }

        .script-title {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .log-item {
            margin-bottom: 0.4rem;
            line-height: 1.4;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .log-time {
            color: #64748b;
            margin-right: 0.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<header>
    <h1>Automated Shorts Generator</h1>
    <p class="subtitle">Select a trend, category, and video to kickstart your pipeline.</p>
</header>

<div class="container">
    <div class="controls">
        <select id="regionSelect">
            <option value="" disabled selected>1. Select Region</option>
            <option value="US">United States</option>
            <option value="IN">India</option>
            <option value="GB">United Kingdom</option>
            <option value="CA">Canada</option>
            <option value="AU">Australia</option>
        </select>

        <select id="categorySelect" disabled>
            <option value="" disabled selected>2. Select Category</option>
        </select>

        <button id="fetchBtn" disabled>3. Fetch Trending Videos</button>
    </div>

    <!-- Live Status Panel (Hidden by default) -->
    <div id="statusContainer" class="status-container">
        <div class="status-title">Generation Pipeline</div>
        <div class="current-status" id="currentStatus">
            <div class="spinner" id="statusSpinner"></div>
            <span id="statusText">Initializing process...</span>
        </div>
        <div class="log-terminal" id="logTerminal"></div>
        <div id="scriptOutput" class="script-output">
            <div class="script-title">✨ Gemini AI Generated Script</div>
            <div id="scriptContent"></div>
        </div>
    </div>

    <div id="loader" class="loader">Fetching data from YouTube API...</div>

    <div id="videosGrid" class="videos-grid"></div>
</div>

<script>
    const regionSelect = document.getElementById('regionSelect');
    const categorySelect = document.getElementById('categorySelect');
    const fetchBtn = document.getElementById('fetchBtn');
    const videosGrid = document.getElementById('videosGrid');
    const loader = document.getElementById('loader');
    
    // Status UI elements
    const statusContainer = document.getElementById('statusContainer');
    const statusText = document.getElementById('statusText');
    const statusSpinner = document.getElementById('statusSpinner');
    const logTerminal = document.getElementById('logTerminal');
    const scriptOutput = document.getElementById('scriptOutput');

    regionSelect.addEventListener('change', async () => {
        const region = regionSelect.value;
        categorySelect.innerHTML = '<option value="" disabled selected>Loading categories...</option>';
        categorySelect.disabled = true;
        fetchBtn.disabled = true;

        try {
            const res = await fetch(`/api/categories/${region}`);
            const data = await res.json();
            
            categorySelect.innerHTML = '<option value="" disabled selected>2. Select Category</option>';
            data.categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.textContent = cat.title;
                categorySelect.appendChild(opt);
            });
            categorySelect.disabled = false;
        } catch (e) {
            console.error(e);
            alert('Failed to fetch categories. Please check your console.');
        }
    });

    categorySelect.addEventListener('change', () => {
        fetchBtn.disabled = false;
    });

    fetchBtn.addEventListener('click', async () => {
        const region = regionSelect.value;
        const categoryId = categorySelect.value;
        
        videosGrid.innerHTML = '';
        statusContainer.style.display = 'none';
        loader.style.display = 'block';
        fetchBtn.disabled = true;

        try {
            const res = await fetch(`/api/trending/${region}?category_id=${categoryId}`);
            const data = await res.json();
            
            loader.style.display = 'none';
            fetchBtn.disabled = false;

            if (data.videos.length === 0) {
                videosGrid.innerHTML = '<p style="color:#f8fafc; text-align:center; grid-column:1/-1; padding: 2rem;">No trending videos found for this category.</p>';
                return;
            }

            data.videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <img class="video-thumb" src="${video.thumbnail}" alt="Thumbnail">
                    <div class="video-info">
                        <h3 class="video-title" title="${video.title}">${video.title}</h3>
                        <div class="video-stats">
                            <span>${video.channel}</span>
                            <span>${video.views}</span>
                        </div>
                        <div class="video-stats" style="margin-top: -10px; color: #8b5cf6;">
                            <span>Engagement Rate: ${(video.engagement_ratio * 100).toFixed(2)}%</span>
                        </div>
                        <button class="generate-btn" onclick="startGeneration('${video.id}', '${video.title.replace(/'/g, "\\'")}')">
                            Generate Short
                        </button>
                    </div>
                `;
                videosGrid.appendChild(card);
            });
        } catch (e) {
            loader.style.display = 'none';
            fetchBtn.disabled = false;
            console.error(e);
            alert('Failed to fetch trending videos.');
        }
    });

    let pollInterval = null;
    let seenLogs = new Set();

    function addLog(msg) {
        if(seenLogs.has(msg)) return;
        seenLogs.add(msg);
        
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
        
        const div = document.createElement('div');
        div.className = 'log-item';
        div.innerHTML = `<span class="log-time">[${timeStr}]</span> ${msg}`;
        logTerminal.appendChild(div);
        
        // Auto-scroll
        logTerminal.scrollTop = logTerminal.scrollHeight;
    }

    async function startGeneration(videoId, title) {
        if(!confirm(`Do you want to extract content and synthesize a Short for:\n"${title}"?`)) return;

        // Reset UI for generation
        window.scrollTo({ top: 0, behavior: 'smooth' });
        statusContainer.style.display = 'block';
        logTerminal.innerHTML = '';
        seenLogs.clear();
        statusText.textContent = 'Initializing pipeline...';
        statusText.style.color = '#cbd5e1';
        statusSpinner.style.display = 'inline-block';

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    topic: title,
                    video_id: videoId,
                    region: regionSelect.value || 'US'
                })
            });
            const data = await res.json();
            const jobId = data.job_id;

            // Redirect to next page
            window.location.href = `/generation/${jobId}`;

        } catch (e) {
            console.error(e);
            alert('Failed to start generation pipeline.');
            statusContainer.style.display = 'none';
        }
    }
</script>

</body>
</html>
